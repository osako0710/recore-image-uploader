<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECORE 画像アップロードツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --warn: #ff8c47;
    --ok: #47ffb2;
    --text: #f0f0f0;
    --muted: #666;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .header-progress { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .header-progress span { color: var(--text); }

  .layout { display: grid; grid-template-columns: 1fr 320px; flex: 1; }
  .main { padding: 32px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }

  .setup { display: flex; flex-direction: column; gap: 20px; max-width: 560px; margin: 40px auto; width: 100%; }
  .setup-title { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .section-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }

  .input-field { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }

  .file-drop { border: 1px dashed var(--border); border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface2); position: relative; }
  .file-drop:hover, .file-drop.drag { border-color: var(--accent); background: #1e2010; }
  .file-drop-label { font-size: 13px; color: var(--muted); }
  .file-drop-label span { color: var(--accent); }

  .btn { padding: 12px 24px; border-radius: 6px; font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.04em; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #d4eb2e; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-ok { background: var(--ok); color: #000; }
  .btn-ok:hover { background: #2ee89a; }
  .btn-skip { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-skip:hover { border-color: var(--muted); color: var(--text); }
  .btn-warn { background: var(--warn); color: #000; }
  .btn-warn:hover { background: #e07030; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

  .item-meta { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .item-pkgi { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.1em; margin-bottom: 6px; }
  .item-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .item-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 3px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1a1e0a; }
  .upload-zone-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.8; pointer-events: none; }
  .upload-zone-text span { color: var(--accent); font-family: var(--mono); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .image-thumb { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: var(--surface2); }
  .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .image-thumb-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.75); font-family: var(--mono); font-size: 9px; padding: 3px 5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .image-remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.8); border: none; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; }
  .image-thumb:hover .image-remove { opacity: 1; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; resize: vertical; min-height: 60px; transition: border-color 0.2s; }
  .note-input:focus { border-color: var(--accent2); }
  .note-input::placeholder { color: var(--muted); }

  .sidebar { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; max-height: calc(100vh - 57px); }
  .sidebar-section-title { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .stat-num { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .stat-ok .stat-num { color: var(--ok); }
  .stat-skip .stat-num { color: var(--muted); }
  .stat-warn .stat-num { color: var(--warn); }
  .stat-total .stat-num { color: var(--accent); }

  .history-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
  .history-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 5px; background: var(--surface2); border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: border-color 0.15s; }
  .history-item:hover { border-color: var(--muted); }
  .history-badge { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-ok { background: var(--ok); }
  .badge-skip { background: var(--muted); }
  .badge-warn { background: var(--warn); }
  .history-pkgi { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .history-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

  .push-btn { width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.8; }
  .push-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .push-btn.pushing { border-color: var(--accent); color: var(--accent); }
  .push-btn-sub { font-size: 10px; color: var(--muted); }

  .export-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .export-btn:hover { border-color: var(--ok); color: var(--ok); }

  .nav-row { display: flex; align-items: center; justify-content: space-between; }
  .nav-counter { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  .progress-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-family: var(--mono); font-size: 12px; color: var(--text); z-index: 1000; transform: translateY(80px); opacity: 0; transition: all 0.25s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--ok); color: var(--ok); }
  .toast.warn { border-color: var(--warn); color: var(--warn); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 2; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
let state = {
  screen: 'setup',
  githubToken: localStorage.getItem('gh_token') || '',
  githubRepo: 'osako0710/mercari-images',
  items: [],
  currentIndex: 0,
  results: {},
  currentImages: [],
  currentNote: '',
  dragOver: false,
};

function render() {
  document.getElementById('app').innerHTML =
    state.screen === 'setup' ? renderSetup() : renderWork();
  bindEvents();
}

function renderSetup() {
  return `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:var(--bg);">
    <div class="setup">
      <div>
        <div class="setup-title">RECORE 画像アップロードツール</div>
        <div style="font-size:24px;font-weight:700;margin-bottom:6px;">セットアップ</div>
        <div style="font-size:13px;color:var(--muted);">GitHub tokenとCSVを設定して作業を開始してください</div>
      </div>
      <div>
        <div class="section-label">GitHub Personal Access Token</div>
        <input class="input-field" id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${state.githubToken}">
        <div style="font-size:11px;color:var(--muted);margin-top:6px;">Settings → Developer settings → Personal access tokens → repo権限</div>
      </div>
      <div>
        <div class="section-label">Push先リポジトリ</div>
        <input class="input-field" id="gh-repo" type="text" value="${state.githubRepo}">
      </div>
      <div>
        <div class="section-label">CSVファイル（シクサク様出品リスト）</div>
        <div class="file-drop" id="csv-drop">
          <div class="file-drop-label">
            ${state.items.length > 0
              ? `<span>✓ ${state.items.length}件 読み込み済み</span>`
              : `CSVをここにドロップ or <span>クリックして選択</span>`}
          </div>
          <input type="file" id="csv-input" accept=".csv">
        </div>
      </div>
      <button class="btn btn-primary" id="start-btn" ${state.items.length === 0 || !state.githubToken ? 'disabled' : ''}>
        作業開始 →
      </button>
    </div>
  </div>`;
}

function renderWork() {
  const item = state.items[state.currentIndex];
  const total = state.items.length;
  const done = Object.keys(state.results).length;
  const okCount = Object.values(state.results).filter(r => r.status === 'ok').length;
  const skipCount = Object.values(state.results).filter(r => r.status === 'skip').length;
  const warnCount = Object.values(state.results).filter(r => r.status === 'warn').length;
  const progress = total > 0 ? Math.round((done / total) * 100) : 0;

  const historyHtml = Object.entries(state.results).reverse().map(([pkgi, r]) => {
    const it = state.items.find(i => i.pkgi === pkgi);
    const bc = r.status === 'ok' ? 'badge-ok' : r.status === 'skip' ? 'badge-skip' : 'badge-warn';
    return `<div class="history-item" data-pkgi="${pkgi}">
      <div class="history-badge ${bc}"></div>
      <div class="history-pkgi">${pkgi.replace('PKGI-','')}</div>
      <div class="history-name">${it ? it.name.substring(0,18) : pkgi}</div>
      <div style="font-size:10px;color:var(--muted);flex-shrink:0;">${(r.images||[]).length}枚</div>
    </div>`;
  }).join('');

  const thumbsHtml = state.currentImages.map((img, i) => `
    <div class="image-thumb">
      <img src="${img.dataUrl}">
      <div class="image-thumb-label">${img.name}</div>
      <button class="image-remove" data-idx="${i}">×</button>
    </div>`).join('');

  return `
  <div style="display:flex;flex-direction:column;height:100vh;">
    <div class="header">
      <div class="header-title">RECORE IMAGE UPLOADER</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="header-progress">${done} / <span>${total}</span> 完了 (${progress}%)</div>
        <button class="btn btn-ghost" id="settings-btn" style="padding:6px 12px;font-size:11px;">⚙ 設定</button>
      </div>
    </div>
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="layout" style="flex:1;overflow:hidden;">
      <div class="main">
        ${item ? `
          <div class="nav-row">
            <div class="nav-counter"><span style="color:var(--text);font-family:var(--mono);">${state.currentIndex + 1}</span> <span style="font-family:var(--mono);">/ ${total}</span></div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-ghost" id="prev-btn" style="padding:6px 14px;font-size:12px;" ${state.currentIndex === 0 ? 'disabled' : ''}>← 前へ</button>
              <button class="btn btn-ghost" id="next-btn" style="padding:6px 14px;font-size:12px;" ${state.currentIndex >= total-1 ? 'disabled' : ''}>次へ →</button>
            </div>
          </div>
          <div class="item-meta">
            <div class="item-pkgi">${item.pkgi}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-tags">
              <span class="tag">${item.bundlingId}</span>
              <span class="tag">${item.type}</span>
              <span class="tag">${item.shop.replace(/_/g,'.')}</span>
              <span class="tag">¥${Number(item.price||0).toLocaleString()}</span>
            </div>
          </div>
          <div>
            <div class="section-label">画像（${state.currentImages.length}枚）</div>
            <div class="upload-zone ${state.dragOver ? 'drag' : ''}" id="upload-zone">
              <div class="upload-zone-text">画像をドロップ or <span>クリックして選択</span><br><span style="font-size:11px;color:var(--muted);font-family:var(--sans);">jpg / png / webp · 複数枚OK</span></div>
              <input type="file" id="img-input" accept="image/*" multiple>
            </div>
            ${state.currentImages.length > 0 ? `<div class="image-grid" style="margin-top:12px;">${thumbsHtml}</div>` : ''}
          </div>
          <div>
            <div class="section-label">備考・メモ</div>
            <textarea class="note-input" id="note-input" placeholder="要確認の理由、色違いの可能性など...">${state.currentNote}</textarea>
          </div>
          <div class="actions">
            <button class="btn btn-ok" id="ok-btn">✓ OK・次へ</button>
            <button class="btn btn-warn" id="warn-btn">⚠ 要確認・次へ</button>
            <button class="btn btn-skip" id="skip-btn">→ スキップ</button>
          </div>
        ` : `<div class="empty-state">🎉 全件完了！<br>サイドバーからエクスポートまたはpushしてください</div>`}
      </div>
      <div class="sidebar">
        <div>
          <div class="sidebar-section-title">進捗サマリ</div>
          <div class="stats">
            <div class="stat-card stat-ok"><div class="stat-num">${okCount}</div><div class="stat-label">OK</div></div>
            <div class="stat-card stat-warn"><div class="stat-num">${warnCount}</div><div class="stat-label">要確認</div></div>
            <div class="stat-card stat-skip"><div class="stat-num">${skipCount}</div><div class="stat-label">スキップ</div></div>
            <div class="stat-card stat-total"><div class="stat-num">${total - done}</div><div class="stat-label">残り</div></div>
          </div>
        </div>
        <div>
          <div class="sidebar-section-title">GitHub Push</div>
          <button class="push-btn" id="push-btn">
            ↑ recoreimages/ にpush<br>
            <span class="push-btn-sub">${okCount + warnCount}件の画像をまとめてpush</span>
          </button>
        </div>
        <div>
          <div class="sidebar-section-title">エクスポート</div>
          <button class="export-btn" id="export-csv-btn">📥 進捗CSV ダウンロード</button>
        </div>
        <div>
          <div class="sidebar-section-title">処理済み（${done}件）</div>
          <div class="history-list">${historyHtml || '<div style="font-size:12px;color:var(--muted);padding:8px 0;">まだありません</div>'}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function bindEvents() {
  if (state.screen === 'setup') {
    document.getElementById('gh-token')?.addEventListener('input', e => {
      state.githubToken = e.target.value;
      localStorage.setItem('gh_token', e.target.value);
      document.getElementById('start-btn').disabled = state.items.length === 0 || !state.githubToken;
    });
    document.getElementById('gh-repo')?.addEventListener('input', e => { state.githubRepo = e.target.value; });
    document.getElementById('csv-input')?.addEventListener('change', e => loadCSV(e.target.files[0]));
    document.getElementById('start-btn')?.addEventListener('click', () => { state.screen = 'work'; render(); });

    const drop = document.getElementById('csv-drop');
    if (drop) {
      drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
      drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
      drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); loadCSV(e.dataTransfer.files[0]); });
    }
  } else {
    document.getElementById('settings-btn')?.addEventListener('click', () => { state.screen = 'setup'; render(); });
    document.getElementById('prev-btn')?.addEventListener('click', () => { navigateTo(state.currentIndex - 1); });
    document.getElementById('next-btn')?.addEventListener('click', () => { navigateTo(state.currentIndex + 1); });
    document.getElementById('ok-btn')?.addEventListener('click', () => saveAndNext('ok'));
    document.getElementById('warn-btn')?.addEventListener('click', () => saveAndNext('warn'));
    document.getElementById('skip-btn')?.addEventListener('click', () => saveAndNext('skip'));
    document.getElementById('note-input')?.addEventListener('input', e => { state.currentNote = e.target.value; });
    document.getElementById('push-btn')?.addEventListener('click', pushToGitHub);
    document.getElementById('export-csv-btn')?.addEventListener('click', exportCSV);

    const zone = document.getElementById('upload-zone');
    if (zone) {
      zone.addEventListener('dragover', e => { e.preventDefault(); state.dragOver = true; render(); });
      zone.addEventListener('dragleave', () => { state.dragOver = false; render(); });
      zone.addEventListener('drop', e => { e.preventDefault(); state.dragOver = false; handleImages(e.dataTransfer.files); });
    }
    document.getElementById('img-input')?.addEventListener('change', e => handleImages(e.target.files));

    document.querySelectorAll('.image-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        state.currentImages.splice(parseInt(btn.dataset.idx), 1);
        render();
      });
    });

    document.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = state.items.findIndex(i => i.pkgi === el.dataset.pkgi);
        if (idx >= 0) navigateTo(idx);
      });
    });
  }
}

function navigateTo(idx) {
  state.currentIndex = Math.max(0, Math.min(state.items.length - 1, idx));
  const pkgi = state.items[state.currentIndex]?.pkgi;
  if (pkgi && state.results[pkgi]) {
    state.currentImages = [...(state.results[pkgi].images || [])];
    state.currentNote = state.results[pkgi].note || '';
  } else {
    state.currentImages = [];
    state.currentNote = '';
  }
  render();
}

function loadCSV(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
    const items = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 5 || !cols[1]?.trim().startsWith('PKGI-')) continue;
      items.push({
        bundlingId: cols[0]?.trim(),
        pkgi: cols[1]?.trim(),
        shelf: cols[2]?.trim(),
        type: cols[3]?.trim(),
        name: cols[4]?.trim(),
        qty: cols[5]?.trim(),
        price: cols[7]?.trim(),
        shop: cols[8]?.trim() || '',
      });
    }
    state.items = items;
    showToast(`${items.length}件 読み込みました`, 'ok');
    render();
  };
  reader.readAsText(file, 'UTF-8');
}

function handleImages(files) {
  const pkgi = state.items[state.currentIndex]?.pkgi || 'UNKNOWN';
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const idx = state.currentImages.length + 1;
      state.currentImages.push({ name: `${pkgi}_${idx}.jpg`, dataUrl: e.target.result });
      render();
    };
    reader.readAsDataURL(file);
  });
}

function saveAndNext(status) {
  const item = state.items[state.currentIndex];
  if (!item) return;
  const images = state.currentImages.map((img, i) => ({ ...img, name: `${item.pkgi}_${i+1}.jpg` }));
  state.results[item.pkgi] = { status, images, note: state.currentNote, name: item.name };
  showToast({ ok:'OK ✓', warn:'要確認 ⚠', skip:'スキップ →' }[status], status);
  if (state.currentIndex < state.items.length - 1) {
    navigateTo(state.currentIndex + 1);
  } else {
    state.currentImages = [];
    state.currentNote = '';
    render();
  }
}

async function pushToGitHub() {
  const btn = document.getElementById('push-btn');
  btn?.classList.add('pushing');
  let success = 0, fail = 0;

  for (const [, result] of Object.entries(state.results)) {
    if (!result.images?.length) continue;
    for (const img of result.images) {
      try {
        const base64 = img.dataUrl.split(',')[1];
        const url = `https://api.github.com/repos/${state.githubRepo}/contents/recoreimages/${img.name}`;
        let sha;
        try {
          const res = await fetch(url, { headers: { Authorization: `token ${state.githubToken}`, Accept: 'application/vnd.github.v3+json' } });
          if (res.ok) { sha = (await res.json()).sha; }
        } catch {}
        const body = { message: `add ${img.name}`, content: base64, branch: 'main' };
        if (sha) body.sha = sha;
        const res = await fetch(url, { method: 'PUT', headers: { Authorization: `token ${state.githubToken}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' }, body: JSON.stringify(body) });
        res.ok ? success++ : fail++;
      } catch { fail++; }
    }
  }

  btn?.classList.remove('pushing');
  showToast(`push完了: ${success}件成功${fail > 0 ? ` / ${fail}件失敗` : ''}`, fail > 0 ? 'warn' : 'ok');
}

function exportCSV() {
  const rows = [['PKGI','商品名','ステータス','画像枚数','画像ファイル名','備考']];
  for (const [pkgi, r] of Object.entries(state.results)) {
    rows.push([pkgi, r.name||'', r.status, (r.images||[]).length, (r.images||[]).map(i=>i.name).join(';'), r.note||'']);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv'}));
  a.download = `recore_progress_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

render();
</script>
</body>
