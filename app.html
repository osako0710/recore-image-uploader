<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECORE 出品管理ツール</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#e8ff47;--accent2:#47c8ff;--warn:#ff8c47;--ok:#47ffb2;--err:#ff5f5f;
  --text:#f0f0f0;--muted:#666;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
/* Layout */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.header-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;}
.layout{display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 53px);}
.main{padding:24px 28px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;border-right:1px solid var(--border);}
.sidebar{padding:20px 18px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
/* Setup */
.setup{max-width:540px;margin:40px auto;display:flex;flex-direction:column;gap:18px;}
.section-label{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.input-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:11px 13px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s;}
.input-field:focus{border-color:var(--accent);}
.input-field::placeholder{color:var(--muted);}
.file-drop{border:1px dashed var(--border);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2);position:relative;}
.file-drop:hover,.file-drop.drag{border-color:var(--accent);background:#1e2010;}
.file-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;}
/* Buttons */
.btn{padding:10px 20px;border-radius:6px;font-family:var(--mono);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;letter-spacing:.03em;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#d4eb2e;}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2);}
/* Item card */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.item-pkgi{font-family:var(--mono);font-size:11px;color:var(--accent2);letter-spacing:.1em;margin-bottom:5px;}
.item-name{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.4;}
.item-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:3px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.tag-color{border-color:#ff8c47;color:#ff8c47;}
.tag-size{border-color:#47c8ff;color:#47c8ff;}
.tag-stack{border-color:#b47fff;color:#b47fff;}
/* Bundling detail */
.bundling-box{background:var(--surface2);border:1px solid #b47fff33;border-radius:8px;padding:14px;}
.bundling-title{font-family:var(--mono);font-size:11px;color:#b47fff;margin-bottom:8px;letter-spacing:.06em;}
.bundling-table{width:100%;border-collapse:collapse;font-size:12px;}
.bundling-table th{text-align:left;color:var(--muted);font-family:var(--mono);font-size:10px;padding:4px 8px;border-bottom:1px solid var(--border);}
.bundling-table td{padding:5px 8px;border-bottom:1px solid #1e1e1e;font-family:var(--mono);}
.bundling-table tr:last-child td{border-bottom:none;}
/* Flag badges */
.flag-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.flag-badge{font-size:12px;padding:4px 10px;border-radius:4px;font-weight:600;}
.flag-color{background:#3d1f00;color:#ff8c47;border:1px solid #ff8c4766;}
.flag-size{background:#001f3d;color:#47c8ff;border:1px solid #47c8ff66;}
/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:10px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;background:var(--surface);position:relative;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#1a1e0a;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-text{font-size:13px;color:var(--muted);text-align:center;line-height:1.8;pointer-events:none;}
.upload-zone-text span{color:var(--accent);font-family:var(--mono);}
/* Image grid */
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.image-thumb{border-radius:8px;overflow:hidden;border:2px solid var(--border);background:var(--surface2);cursor:grab;}
.image-thumb.excluded{opacity:.4;}
.image-thumb.excluded .thumb-img{filter:grayscale(1);}
.thumb-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;pointer-events:none;}
.thumb-footer{padding:7px 8px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.thumb-num{font-family:var(--mono);font-size:11px;color:var(--muted);}
.thumb-controls{display:flex;gap:3px;}
.thumb-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.thumb-btn-use{background:#1a2e1a;color:var(--ok);}
.thumb-btn-use.active,.thumb-btn-use:hover{background:var(--ok);color:#000;border-color:var(--ok);}
.thumb-btn-exc{background:#2e1a1a;color:var(--warn);}
.thumb-btn-exc.active,.thumb-btn-exc:hover{background:var(--warn);color:#000;border-color:var(--warn);}
.thumb-btn-del{background:var(--surface);color:var(--muted);}
.thumb-btn-del:hover{background:#3e1a1a;color:#ff6666;}
.drag-hint{font-size:11px;color:var(--muted);text-align:center;font-family:var(--mono);margin-top:6px;}
/* Info inputs */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
.info-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;}
.info-input:focus{border-color:var(--accent2);}
.info-input::placeholder{color:var(--muted);}
textarea.info-input{resize:vertical;min-height:60px;font-family:var(--sans);}
/* Classification buttons */
.classify-btns{display:flex;gap:8px;flex-wrap:wrap;}
.cls-btn{padding:11px 18px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;letter-spacing:.03em;}
.cls-ok{background:#0a2e1a;color:var(--ok);border-color:#47ffb244;}
.cls-ok:hover,.cls-ok.active{background:var(--ok);color:#000;border-color:var(--ok);}
.cls-color{background:#2e1500;color:#ff8c47;border-color:#ff8c4744;}
.cls-color:hover,.cls-color.active{background:#ff8c47;color:#000;border-color:#ff8c47;}
.cls-size{background:#001528;color:#47c8ff;border-color:#47c8ff44;}
.cls-size:hover,.cls-size.active{background:#47c8ff;color:#000;border-color:#47c8ff;}
.cls-other{background:#1e1e00;color:#ffdd47;border-color:#ffdd4744;}
.cls-other:hover,.cls-other.active{background:#ffdd47;color:#000;border-color:#ffdd47;}
.cls-used{background:#2a0a14;color:#ff5f8f;border-color:#ff5f8f44;}
.cls-used:hover,.cls-used.active{background:#ff5f8f;color:#000;border-color:#ff5f8f;}
.flag-used{background:#2a0a14;color:#ff5f8f;border:1px solid #ff5f8f66;}
/* Nav */
.nav-row{display:flex;align-items:center;justify-content:space-between;}
.progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
/* Sidebar */
.sidebar-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;}
.stat-num{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--muted);}
.history-list{display:flex;flex-direction:column;gap:3px;max-height:240px;overflow-y:auto;}
.history-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-size:12px;cursor:pointer;}
.history-item:hover{border-color:var(--muted);}
.h-badge{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.push-btn{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.8;}
.push-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.export-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .2s;text-align:center;}
.export-btn:hover{border-color:var(--ok);color:var(--ok);}
/* Resume */
.resume-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:18px;display:flex;flex-direction:column;gap:10px;}
.resume-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.resume-val{font-family:var(--mono);}
/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-family:var(--mono);font-size:12px;z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--ok);color:var(--ok);}
.toast.warn{border-color:var(--warn);color:var(--warn);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:2;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// ===== PERSIST =====
function saveState(){
  try{
    localStorage.setItem('recore_v2',JSON.stringify({
      githubRepo:state.githubRepo,items:state.items,
      currentIndex:state.currentIndex,results:state.results
    }));
  }catch(e){}
}
function loadState(){
  try{const s=localStorage.getItem('recore_v2');if(s)return JSON.parse(s);}catch(e){}
  return null;
}
const _s=loadState();
let state={
  screen: _s&&_s.items?.length>0?'resume':'setup',
  githubToken: localStorage.getItem('gh_token')||'',
  githubRepo: _s?.githubRepo||'osako0710/mercari-images',
  items: _s?.items||[],
  currentIndex: _s?.currentIndex||0,
  results: _s?.results||{},
  currentImages:[],currentNote:'',currentColor:'',currentSize:'',
  currentClassifies:[],dragOver:false,dragSrcIdx:null,
  anthropicKey: localStorage.getItem('anthropic_key')||'',
  currentRefUrl:'',currentGenTitle:'',currentGenDesc:'',generating:false,
  pushErrors:[],
};

// ===== RENDER =====
function render(){
  const html=state.screen==='setup'?renderSetup()
    :state.screen==='resume'?renderResume()
    :renderWork();
  document.getElementById('app').innerHTML=html;
  bindEvents();
}

function renderSetup(){
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div class="setup">
    <div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;">RECORE 出品管理ツール v2</div>
      <div style="font-size:24px;font-weight:700;margin-bottom:5px;">セットアップ</div>
      <div style="font-size:13px;color:var(--muted);">フェーズ1まとめCSVとGitHub tokenを設定してください</div>
    </div>
    <div>
      <div class="section-label">GitHub Personal Access Token</div>
      <input class="input-field" id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${state.githubToken}">
      <div style="font-size:11px;color:var(--muted);margin-top:5px;">repo権限が必要です</div>
    </div>
    <div>
      <div class="section-label">Push先リポジトリ</div>
      <input class="input-field" id="gh-repo" value="${state.githubRepo}">
    </div>
    <div>
      <div class="section-label">Anthropic API Key（説明文生成用）</div>
      <input class="input-field" id="anthropic-key" type="password" placeholder="sk-ant-xxxxx" value="${state.anthropicKey}">
      <div style="font-size:11px;color:var(--muted);margin-top:5px;">未入力でも作業可（生成機能のみ無効）</div>
    </div>
    <div>
      <div class="section-label">CSVファイル（フェーズ1_縦積みまとめ）</div>
      <div class="file-drop" id="csv-drop">
        <div style="font-size:13px;color:var(--muted);">
          ${state.items.length>0?`<span style="color:var(--accent)">✓ ${state.items.length}件 読み込み済み</span>`:`CSVをドロップ or <span style="color:var(--accent)">クリックして選択</span>`}
        </div>
        <input type="file" id="csv-input" accept=".csv">
      </div>
    </div>
    <button class="btn btn-primary" id="start-btn" ${state.items.length===0||!state.githubToken?'disabled':''}>作業開始 →</button>
    <div style="font-size:11px;color:var(--muted);text-align:center;">作業開始後、サイドバーの「☁️ クラウドから読込」で<br>他のPCの進捗を引き継げます</div>
  </div>
</div>`;
}

function renderResume(){
  const done=Object.keys(state.results).length;
  const total=state.items.length;
  const next=state.items[state.currentIndex];
  const cl=r=>r.classifies||(r.classify?[r.classify]:[]);
  const okC=Object.values(state.results).filter(r=>cl(r).includes('ok')).length;
  const colorC=Object.values(state.results).filter(r=>cl(r).includes('color')).length;
  const sizeC=Object.values(state.results).filter(r=>cl(r).includes('size')).length;
  const usedC=Object.values(state.results).filter(r=>cl(r).includes('used')).length;
  const otherC=Object.values(state.results).filter(r=>cl(r).includes('other')).length;
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div class="setup">
    <div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;">前回の続き</div>
      <div style="font-size:24px;font-weight:700;margin-bottom:5px;">再開しますか？</div>
    </div>
    <div class="resume-card">
      <div class="resume-row"><span style="color:var(--muted)">処理済み</span><span class="resume-val" style="color:var(--ok)">${done} / ${total}件</span></div>
      <div class="resume-row"><span style="color:var(--muted)">OK</span><span class="resume-val" style="color:var(--ok)">${okC}件</span></div>
      <div class="resume-row"><span style="color:var(--muted)">色確認</span><span class="resume-val" style="color:#ff8c47">${colorC}件</span></div>
      <div class="resume-row"><span style="color:var(--muted)">サイズ確認</span><span class="resume-val" style="color:#47c8ff">${sizeC}件</span></div>
      <div class="resume-row"><span style="color:var(--muted)">中古確認</span><span class="resume-val" style="color:#ff5f8f">${usedC}件</span></div>
      <div class="resume-row"><span style="color:var(--muted)">その他確認</span><span class="resume-val" style="color:#ffdd47">${otherC}件</span></div>
      <div style="border-top:1px solid var(--border);padding-top:8px;">
        <div class="resume-row"><span style="color:var(--muted)">残り</span><span class="resume-val" style="color:var(--accent)">${total-done}件</span></div>
        ${next?`<div class="resume-row" style="margin-top:4px;"><span style="color:var(--muted)">次の商品</span><span style="font-size:12px;max-width:180px;text-align:right;">${next['商品名']?.substring(0,28)}…</span></div>`:''}
      </div>
    </div>
    ${!state.githubToken?`<div style="background:#2e1a0a;border:1px solid var(--warn);border-radius:6px;padding:11px;font-size:12px;color:var(--warn);">⚠ GitHub tokenが未設定です</div>`:''}
    <button class="btn btn-primary" id="resume-btn" ${!state.githubToken?'disabled':''}>続きから再開 →</button>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" id="settings-resume-btn" style="flex:1;text-align:center;">⚙ 設定</button>
      <button class="btn btn-ghost" id="restart-btn" style="flex:1;text-align:center;color:var(--err);border-color:#3e2020;">リセット</button>
    </div>
  </div>
</div>`;
}

function renderWork(){
  const item=state.items[state.currentIndex];
  const total=state.items.length;
  const done=Object.keys(state.results).length;
  const progress=total>0?Math.round(done/total*100):0;
  const cl=r=>r.classifies||(r.classify?[r.classify]:[]);
  const okC=Object.values(state.results).filter(r=>cl(r).includes('ok')).length;
  const colorC=Object.values(state.results).filter(r=>cl(r).includes('color')).length;
  const sizeC=Object.values(state.results).filter(r=>cl(r).includes('size')).length;
  const usedC=Object.values(state.results).filter(r=>cl(r).includes('used')).length;
  const otherC=Object.values(state.results).filter(r=>cl(r).includes('other')).length;

  // history
  const histHtml=Object.entries(state.results).reverse().slice(0,30).map(([pkgi,r])=>{
    const it=state.items.find(i=>i['代表PKGI']===pkgi);
    const colors={ok:'var(--ok)',color:'#ff8c47',size:'#47c8ff',used:'#ff5f8f',other:'#ffdd47'};
    const rc=(r.classifies||[r.classify])[0];
    return`<div class="history-item" data-pkgi="${pkgi}">
      <div class="h-badge" style="background:${colors[rc]||'var(--muted)'}"></div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;">${pkgi.replace('PKGI-','')}</div>
      <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${it?it['商品名'].substring(0,16):pkgi}</div>
      <div style="font-size:10px;color:var(--muted);flex-shrink:0;">${(r.images||[]).length}枚</div>
    </div>`;
  }).join('');

  if(!item) return`<div style="display:flex;flex-direction:column;height:100vh;">
    ${renderHeader(done,total,progress)}
    <div class="empty-state">🎉 全件完了！<br>サイドバーからエクスポートしてください</div>
  </div>`;

  // pkgi数・縦積み情報
  const pkgiList=(item['全PKGI']||'').split(';').filter(Boolean);
  const bundlingIds=(item['Bundling_ID']||'').split(';').filter(Boolean);
  const isStacked=pkgiList.length>1;

  // フラグ
  const needColor=item['色確認']==='YES';
  const needSize=item['サイズ確認']==='YES';
  const needUsed=item['中古確認']==='YES';
  const cls=state.currentClassifies;
  const has=k=>cls.includes(k);

  // 画像サムネイル
  const activeCount=state.currentImages.filter(i=>!i.excluded).length;
  const thumbsHtml=state.currentImages.map((img,i)=>{
    const dispNum=state.currentImages.slice(0,i).filter(x=>!x.excluded).length+1;
    return`<div class="image-thumb ${img.excluded?'excluded':''}" data-idx="${i}">
      <img class="thumb-img" src="${img.dataUrl||img.cdnUrl||''}" onerror="this.style.opacity=0.2;">
      <div class="thumb-footer">
        <span class="thumb-num">${img.excluded?'除外':'_'+dispNum}</span>
        <div class="thumb-controls">
          <button class="thumb-btn thumb-btn-use ${!img.excluded?'active':''}" data-action="use" data-idx="${i}">✓</button>
          <button class="thumb-btn thumb-btn-exc ${img.excluded?'active':''}" data-action="exc" data-idx="${i}">✗</button>
          <button class="thumb-btn thumb-btn-del" data-action="del" data-idx="${i}">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // 色/サイズ入力欄
  const showColorInput=has('color');
  const showSizeInput=has('size');

  return`<div style="display:flex;flex-direction:column;height:100vh;">
  ${renderHeader(done,total,progress)}
  <div class="layout">
    <div class="main">
      <!-- Nav -->
      <div class="nav-row">
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);"><span style="color:var(--text)">${state.currentIndex+1}</span> / ${total}</div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-ghost" id="prev-btn" style="padding:5px 12px;font-size:12px;" ${state.currentIndex===0?'disabled':''}>← 前へ</button>

    document.getElementById('restart-btn')?.addEventListener('click',()=>{
      if(confirm('進捗をリセットしますか？')){
        localStorage.removeItem('recore_v2');
        state={...state,results:{},currentIndex:0,items:[],screen:'setup'};render();
      }
    });
  } else if(state.screen==='setup'){
    document.getElementById('gh-token')?.addEventListener('input',e=>{
      state.githubToken=e.target.value;
      localStorage.setItem('gh_token',e.target.value);
      document.getElementById('start-btn').disabled=!state.githubToken||state.items.length===0;
    });
    document.getElementById('gh-repo')?.addEventListener('input',e=>{state.githubRepo=e.target.value;});
    document.getElementById('anthropic-key')?.addEventListener('input',e=>{
      state.anthropicKey=e.target.value;
      localStorage.setItem('anthropic_key',e.target.value);
    });
    document.getElementById('csv-input')?.addEventListener('change',e=>loadCSV(e.target.files[0]));

    const drop=document.getElementById('csv-drop');
    if(drop){
      drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag');});
      drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
      drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');loadCSV(e.dataTransfer.files[0]);});
    }
  } else {
    document.getElementById('settings-btn')?.addEventListener('click',()=>{state.screen='setup';render();});
    document.getElementById('prev-btn')?.addEventListener('click',()=>navigateTo(state.currentIndex-1));
    document.getElementById('next-btn')?.addEventListener('click',()=>navigateTo(state.currentIndex+1));
    document.getElementById('skip-btn')?.addEventListener('click',()=>navigateTo(state.currentIndex+1));
    document.getElementById('save-next-btn')?.addEventListener('click',saveAndNext);
    document.getElementById('note-input')?.addEventListener('input',e=>{state.currentNote=e.target.value;});
    document.getElementById('ref-url-input')?.addEventListener('input',e=>{state.currentRefUrl=e.target.value;});
    document.getElementById('gen-title-input')?.addEventListener('input',e=>{state.currentGenTitle=e.target.value;});
    document.getElementById('gen-desc-input')?.addEventListener('input',e=>{state.currentGenDesc=e.target.value;});
    document.getElementById('generate-btn')?.addEventListener('click',generateDescription);
    document.getElementById('color-input')?.addEventListener('input',e=>{state.currentColor=e.target.value;});
    document.getElementById('size-input')?.addEventListener('input',e=>{state.currentSize=e.target.value;});
    document.getElementById('push-btn')?.addEventListener('click',pushToGitHub);
    document.getElementById('export-csv-btn')?.addEventListener('click',exportCSV);
    document.getElementById('picking-btn')?.addEventListener('click',exportPickingList);
    document.getElementById('cloud-save-btn')?.addEventListener('click',cloudSave);
    document.getElementById('cloud-load-btn')?.addEventListener('click',cloudLoad);
    document.getElementById('backup-btn')?.addEventListener('click',backupJSON);
    document.getElementById('import-btn')?.addEventListener('click',()=>document.getElementById('import-file').click());
    document.getElementById('import-file')?.addEventListener('change',e=>importJSON(e.target.files[0]));

    // 分類ボタン（複数トグル・OKは排他）
    document.querySelectorAll('[data-cls]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const k=btn.dataset.cls;
        let cls=[...state.currentClassifies];
        if(k==='ok'){
          cls=cls.includes('ok')?[]:['ok'];
        } else {
          cls=cls.filter(x=>x!=='ok'); // OK解除
          cls.includes(k)?cls=cls.filter(x=>x!==k):cls.push(k);
        }
        state.currentClassifies=cls;
        render();
      });

    // 画像アップロード
    const zone=document.getElementById('upload-zone');
    if(zone){
      zone.addEventListener('dragover',e=>{e.preventDefault();if(state.dragSrcIdx!==null)return;state.dragOver=true;render();});
      zone.addEventListener('dragleave',()=>{state.dragOver=false;render();});

    document.getElementById('img-input')?.addEventListener('change',e=>handleImages(e.target.files));

    // サムネイルボタン

      btn.addEventListener('click',e=>{
        e.stopPropagation();

        if(idx>=0)navigateTo(idx);
      });
    });
  }
}

function bindDragSort(){
  const grid=document.getElementById('image-grid');
  if(!grid)return;
  let dragEl=null,placeholder=null,startIdx=null;

  function getThumbAt(x,y){
    for(const el of document.querySelectorAll('.image-thumb')){
      const r=el.getBoundingClientRect();
      if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return el;
    }
    return null;
  }

  document.querySelectorAll('.image-thumb').forEach(thumb=>{
    thumb.addEventListener('mousedown',e=>{
      if(e.target.closest('button'))return;
      e.preventDefault();
      startIdx=parseInt(thumb.dataset.idx);
      dragEl=thumb.cloneNode(true);
      const r=thumb.getBoundingClientRect();
      dragEl.style.cssText=`position:fixed;z-index:9999;pointer-events:none;opacity:.85;width:${thumb.offsetWidth}px;height:${thumb.offsetHeight}px;border:2px solid var(--accent);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);transform:rotate(2deg) scale(1.05);left:${r.left}px;top:${r.top}px;`;
      document.body.appendChild(dragEl);
      placeholder=document.createElement('div');
      placeholder.style.cssText=`width:${thumb.offsetWidth}px;height:${thumb.offsetHeight}px;border:2px dashed var(--accent2);border-radius:8px;background:#1a2030;opacity:.5;`;
      thumb.replaceWith(placeholder);
      thumb.style.display='none';
      document.body.appendChild(thumb);
      state.dragSrcIdx=startIdx;

      const onMove=e=>{
        if(!dragEl)return;
        dragEl.style.left=(e.clientX-thumb.offsetWidth/2)+'px';
        dragEl.style.top=(e.clientY-thumb.offsetHeight/2)+'px';
        const over=getThumbAt(e.clientX,e.clientY);
        if(over&&over!==placeholder&&over.dataset.idx!==undefined){
          const or=over.getBoundingClientRect();
          e.clientX<or.left+or.width/2?grid.insertBefore(placeholder,over):grid.insertBefore(placeholder,over.nextSibling);
        }
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        if(dragEl){dragEl.remove();dragEl=null;}
        const children=[...grid.children];
        const phIdx=children.indexOf(placeholder);
        let destIdx=0;
        for(let i=0;i<phIdx;i++){if(children[i].classList?.contains('image-thumb'))destIdx++;}
        if(placeholder){placeholder.remove();placeholder=null;}
        if(thumb.parentNode)thumb.remove();
        if(startIdx!==null&&startIdx!==destIdx){
          const imgs=[...state.currentImages];
          const[moved]=imgs.splice(startIdx,1);
          imgs.splice(destIdx>startIdx?destIdx-1:destIdx,0,moved);
          state.currentImages=imgs;
        }
        startIdx=null;state.dragSrcIdx=null;
        render();
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
}

function navigateTo(idx){
  state.currentIndex=Math.max(0,Math.min(state.items.length-1,idx));
  saveState();
  const pkgi=state.items[state.currentIndex]?.['代表PKGI'];
  if(pkgi&&state.results[pkgi]){
    const r=state.results[pkgi];
    state.currentImages=[...(r.images||[])];
    state.currentNote=r.note||'';
    state.currentColor=r.color||'';
    state.currentSize=r.size||'';
    state.currentClassifies=r.classifies||(r.classify?[r.classify]:[]);
    state.currentRefUrl=r.refUrl||'';
    state.currentGenTitle=r.genTitle||'';
    state.currentGenDesc=r.genDesc||'';
  } else {
    state.currentImages=[];state.currentNote='';
    state.currentColor='';state.currentSize='';state.currentClassifies=[];
    state.currentRefUrl='';state.currentGenTitle='';state.currentGenDesc='';
  }
  render();
}

function parseCSV(text){
  const rows=[];
  let row=[],field='',inQ=false;
  // BOM除去
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){
      if(c==='"'&&n==='"'){field+='"';i++;}
      else if(c==='"'){inQ=false;}
      else{field+=c;}
    } else {
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(field);field='';}
      else if(c==='\r'&&n==='\n'){row.push(field);rows.push(row);row=[];field='';i++;}
      else if(c==='\n'||c==='\r'){row.push(field);rows.push(row);row=[];field='';}
      else{field+=c;}
    }
  }
  if(field||row.length)row.push(field),rows.push(row);
  return rows;
}

function loadCSV(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result);
    if(rows.length<2)return;
    const headers=rows[0].map(h=>h.trim());
    const items=[];
    for(let i=1;i<rows.length;i++){
      const vals=rows[i];
      const row={};
      headers.forEach((h,j)=>{row[h]=(vals[j]||'').trim();});
      if(row['代表PKGI']&&row['代表PKGI'].startsWith('PKGI-'))items.push(row);
    }
    state.items=items;
    saveState();
    showToast(`${items.length}件 読み込みました`,'ok');
    render();
  };
  reader.readAsText(file,'UTF-8');
}

function handleImages(files){
  const pkgi=state.items[state.currentIndex]?.['代表PKGI']||'UNKNOWN';
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      state.currentImages.push({name:`${pkgi}_${state.currentImages.length+1}.jpg`,dataUrl:e.target.result,excluded:false});
      render();
    };
    reader.readAsDataURL(file);
  });
}

async function generateDescription(){
  if(!state.anthropicKey){
    showToast('APIキーが未設定です（設定画面で入力）','warn');return;
  }
  const item=state.items[state.currentIndex];
  if(!item)return;
  state.generating=true;render();

  // 参照URLの中身を取得（可能なら）
  let refText='';
  if(state.currentRefUrl){
    try{
      const r=await fetch(state.currentRefUrl);
      if(r.ok){
        // 文字コード判定（EUC-JP / Shift_JIS / UTF-8対応）
        const buf=await r.arrayBuffer();
        const ct=(r.headers.get('content-type')||'').toLowerCase();
        let charset='utf-8';
        if(ct.includes('euc-jp'))charset='euc-jp';
        else if(ct.includes('shift_jis')||ct.includes('sjis')||ct.includes('shift-jis'))charset='shift_jis';
        else {
          // metaタグからも判定（先頭1024バイトをasciiで覗く）
          const head=new TextDecoder('ascii').decode(buf.slice(0,1024)).toLowerCase();
          if(head.includes('euc-jp'))charset='euc-jp';
          else if(head.includes('shift_jis')||head.includes('shift-jis')||head.includes('sjis'))charset='shift_jis';
        }
        let html;
        try{html=new TextDecoder(charset).decode(buf);}
        catch{html=new TextDecoder('utf-8').decode(buf);}

        // script/style/nav/header/footer除去
        let body=html
          .replace(/<script[\s\S]*?<\/script>/gi,' ')
          .replace(/<style[\s\S]*?<\/style>/gi,' ')
          .replace(/<nav[\s\S]*?<\/nav>/gi,' ')
          .replace(/<header[\s\S]*?<\/header>/gi,' ')
          .replace(/<footer[\s\S]*?<\/footer>/gi,' ');
        // メタ情報（description/keywords）を優先的に先頭へ
        let meta='';
        const desc=html.match(/<meta[^>]*(?:name|property)=["'](?:description|og:description)["'][^>]*content=["']([^"']+)["']/i);
        if(desc)meta+='説明: '+desc[1]+'\n';
        const kw=html.match(/<meta[^>]*name=["']keywords["'][^>]*content=["']([^"']+)["']/i);
        if(kw)meta+='キーワード: '+kw[1]+'\n';
        // タグ除去してテキスト化
        body=body.replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
        refText=(meta+body).slice(0,8000);
      }
    }catch(e){refText='(参照URL取得失敗: '+e.message+')';}
  }

  const cls=state.currentClassifies;
  const isUsed=cls.includes('used')||item['中古確認']==='YES';
  const stateLabel=isUsed?'中古品（傷、汚れあり）':'新品・未使用';
  const titleStateLabel=isUsed?'【中古】':'【新品未使用】';

  const prompt=`あなたはメルカリShops「マカセル公式ショップ」の出品担当です。以下の商品情報から、ショップの定型フォーマットに沿った「タイトル」と「商品説明文」を生成してください。

# 商品情報
商品名: ${item['商品名']}
ショップ(仕入元): ${item['Shop_Key']||''}
価格: ${item['単価']||''}円
状態: ${stateLabel}
${state.currentColor?'色: '+state.currentColor:''}
${state.currentSize?'サイズ: '+state.currentSize:''}
管理コード(商品ID): ${item['代表PKGI']}
${refText?'\n# 参照ページ情報\n'+refText:''}

# 重要：色・サイズの判定
- 添付画像がある場合は、画像から色・素材・形状を読み取って反映する
- 参照ページ情報にサイズ表記（cm、容量、S/M/Lなど）があれば必ず拾う
- 上の「色」「サイズ」が指定されていればそれを最優先で使う
- 色が不明な場合は「画像をご確認ください」とする
- サイズが不明な場合は「公式サイトをご確認ください」とする

# タイトルのルール
- 形式: ${titleStateLabel}ブランド名（英語＋カタカナ両方） 商品名の主要キーワード 型番/特徴 カラー サイズ
- ブランド名は英語表記とカタカナ表記を両方入れる（例: SEIKO セイコー、GUCCI グッチ）
- 元商品名に含まれる重要キーワード（限定数、型番、コラボ名、英語名など）はできるだけ残す。「DECEPTICON」のような英語表記もそのまま入れる
- 商品の属性として正しいワードのみ入れる（例: ユニセックス、男女兼用、レディース、メンズ、サイズ表記）
- 「人気」「プレゼント」「ギフト」「おすすめ」などの汎用的な販促ワードは入れない
- 短くまとめすぎず、商品情報を網羅して50〜70文字程度にする
- 良い例: 【新品未使用】SEIKO セイコー トランスフォーマー × セイコーコラボレーションウオッチ DECEPTICON 限定300本 ユニセックス 男女兼用 レディース メンズ
- 悪い例（短すぎ・日本語のみ・キーワード欠落）: 【新品未使用】セイコー×トランスフォーマー コラボウォッチ ディセプティコン 限定モデル
- 悪い例（汎用販促ワードが入っている）: 【新品未使用】SEIKO セイコー ... 人気 プレゼント ギフト

# 説明文のフォーマット（厳守）
【商品概要】
━━━━━━━━━━━━━━━━━━━━
商品名：
ブランド / メーカー：
型番：（参照ページに明記されている正式な型番のみ記載。なければこの行を省略。※管理コードPKGIは型番ではないので絶対に書かない）
カラー：
サイズ / 容量：
状態：${stateLabel}
━━━━━━━━━━━━━━━━━━━━
【商品詳細】
（商品の魅力を2-3行）

【コンディション・内容】
${isUsed?'（中古のため、傷・汚れの可能性、画像優先の注意書きを記載）':'（新品・未使用品である旨、画像優先の注意書きを記載）'}

【付属品について】
（画像に写っているものが全てという注意書き）

【お取引上のご注意】
発送方法：佐川急便または日本郵便
発送時期：2-3日以内
※値下げ交渉・個別のご質問には対応しておりません。
━━━━━━━━━━━━━━━━━━━━
（ここに検索キーワードをスペース区切りで列挙する。「キーワード：」というラベルは付けない。ここには「人気」「プレゼント」「ギフト」などの販促ワードを入れてよい）
━━━━━━━━━━━━━━━━━━━━
よろしくお願いいたします。

商品ID：${item['代表PKGI']}

# 重要な注意
- タイトル末尾に【ATB】のような管理コード記号は絶対に付けない
- タイトル冒頭の状態ラベルは必ず「${titleStateLabel}」にする

# 出力形式（厳守・JSON以外何も書かない）
{"title":"生成したタイトル","description":"生成した説明文全文"}`;

  try{
    // アップロード画像（除外していないもの）を最大4枚までAPIに渡す
    const useImgs=state.currentImages.filter(i=>!i.excluded).slice(0,4);
    const content=[];
    for(const img of useImgs){
      const m=img.dataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
      if(m){
        content.push({type:'image',source:{type:'base64',media_type:m[1],data:m[2]}});
      }
    }
    content.push({type:'text',text:prompt});

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':state.anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
        'content-type':'application/json',
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2000,
        messages:[{role:'user',content}],
      }),
    });
    const data=await res.json();
    if(data.error){showToast('生成エラー: '+data.error.message,'warn');state.generating=false;render();return;}
    let txt=data.content.map(b=>b.text||'').join('').trim();
    txt=txt.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    state.currentGenTitle=parsed.title||'';
    state.currentGenDesc=parsed.description||'';
    showToast('生成しました ✓','ok');
  }catch(e){
    showToast('生成失敗: '+e.message,'warn');
  }
  state.generating=false;render();
}

function saveAndNext(){
  const item=state.items[state.currentIndex];
  if(!item||state.currentClassifies.length===0)return;
  let num=1;
  const images=state.currentImages.filter(i=>!i.excluded).map(i=>({...i,name:`${item['代表PKGI']}_${num++}.jpg`}));
  state.results[item['代表PKGI']]={
    classifies:[...state.currentClassifies],
    images,note:state.currentNote,
    color:state.currentColor,size:state.currentSize,
    name:item['商品名'],
    refUrl:state.currentRefUrl,
    genTitle:state.currentGenTitle,
    genDesc:state.currentGenDesc,
    pkgiList:(item['全PKGI']||'').split(';').filter(Boolean),
    bundlingIds:(item['Bundling_ID']||'').split(';').filter(Boolean),
    shelfNos:(item['Shelf_No']||'').split(';').filter(Boolean),
  };
  saveState();
  showToast('保存しました ✓','ok');
  if(state.currentIndex<state.items.length-1)navigateTo(state.currentIndex+1);
  else{state.currentImages=[];state.currentNote='';state.currentColor='';state.currentSize='';state.currentClassifies=[];state.currentRefUrl='';state.currentGenTitle='';state.currentGenDesc='';render();}
}

async function pushToGitHub(){
  const btn=document.getElementById('push-btn');
  if(btn){btn.classList.add('pushing');btn.innerHTML='push中...';}
  let success=0,fail=0,skipped=0;
  const errors=[];
  for(const[pkgi,r] of Object.entries(state.results)){
    if(!r.images?.length)continue;
    for(const img of r.images){
      try{
        if((!img.dataUrl||img.dataUrl==='')&&(img.pushed||img.cdnUrl)){skipped++;continue;}
        const base64=img.dataUrl.split(',')[1];
        if(!base64){errors.push(`${img.name}: 画像データなし（再アップロードが必要）`);fail++;continue;}
        const url=`https://api.github.com/repos/${state.githubRepo}/contents/recoreimages/${img.name}`;
        let sha;
        try{const res=await fetch(url,{headers:{Authorization:`token ${state.githubToken}`,Accept:'application/vnd.github.v3+json'}});if(res.ok)sha=(await res.json()).sha;}catch{}
        const body={message:`add ${img.name}`,content:base64,branch:'main'};
        if(sha)body.sha=sha;
        const res=await fetch(url,{method:'PUT',headers:{Authorization:`token ${state.githubToken}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify(body)});
        if(res.ok){success++;img.pushed=true;img.cdnUrl=`https://raw.githubusercontent.com/${state.githubRepo}/main/recoreimages/${img.name}`;}
        else{
          let msg=res.status+'';
          try{const d=await res.json();if(d.message)msg+=' '+d.message;}catch{}
          errors.push(`${img.name}: ${msg}`);
          fail++;
        }
      }catch(e){errors.push(`${img.name}: ${e.message}`);fail++;}
    }
  }
  state.pushErrors=errors;
  if(btn){btn.classList.remove('pushing');}
  saveState();
  render();
  showToast(`push完了: 新規${success}件${skipped>0?` / push済${skipped}件スキップ`:''}${fail>0?` / ${fail}件失敗`:''}`,fail>0?'warn':'ok');
}

function exportCSV(){
  const rows=[['代表PKGI','全PKGI','PKGI数','Bundling_ID','Shelf_No','商品名','分類','色情報','サイズ情報','生成タイトル','生成説明文','参照URL','画像枚数','画像ファイル名','備考']];
  for(const[pkgi,r] of Object.entries(state.results)){
    const item=state.items.find(i=>i['代表PKGI']===pkgi);
    rows.push([
      pkgi,item?.['全PKGI']||'',item?.['PKGI数']||'',
      (r.bundlingIds||[]).join(';'),(r.shelfNos||[]).join(';'),
      r.name||'',(r.classifies||[r.classify]).filter(Boolean).join(';'),(r.color||''),(r.size||''),
      (r.genTitle||''),(r.genDesc||''),(r.refUrl||''),
      (r.images||[]).length,(r.images||[]).map(i=>i.name).join(';'),r.note||''
    ]);
  }
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl('\uFEFF'+csv,'recore_progress_'+new Date().toISOString().slice(0,10)+'.csv','text/csv');
}

function exportPickingList(){
  // 現場スタッフ向け：確認が必要なものだけBundling IDで一覧化
  const needCheck=Object.entries(state.results)
    .filter(([,r])=>{const cl=r.classifies||(r.classify?[r.classify]:[]);return cl.length>0&&!(cl.length===1&&cl[0]==='ok');});
  
  const rows=[['Bundling_ID','Shelf_No','代表PKGI','全PKGI (構成)','商品名','確認種別','色情報','サイズ情報','備考']];
  for(const[pkgi,r] of needCheck){
    const item=state.items.find(i=>i['代表PKGI']===pkgi);
    const labels={color:'色確認',size:'サイズ確認',used:'中古確認',other:'その他確認'};
    const clsStr=(r.classifies||[r.classify]).filter(x=>x&&x!=='ok').map(x=>labels[x]||x).join('+');
    rows.push([
      (r.bundlingIds||[]).join(';'),(r.shelfNos||[]).join(';'),
      pkgi,(r.pkgiList||[]).join(';'),r.name||'',
      clsStr,r.color||'',r.size||'',r.note||''
    ]);
  }

  // 未処理分も追加（スキップされたもの）
  const processed=new Set(Object.keys(state.results));
  for(const item of state.items){
    if(!processed.has(item['代表PKGI'])&&(item['色確認']==='YES'||item['サイズ確認']==='YES'||item['中古確認']==='YES')){
      rows.push([
        item['Bundling_ID']||'',item['Shelf_No']||'',
        item['代表PKGI'],item['全PKGI']||'',item['商品名']||'',
        [item['色確認']==='YES'?'色確認':'',item['サイズ確認']==='YES'?'サイズ確認':'',item['中古確認']==='YES'?'中古確認':''].filter(Boolean).join('+'),
        '','',''
      ]);
    }
  }

  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl('\uFEFF'+csv,'picking_list_'+new Date().toISOString().slice(0,10)+'.csv','text/csv');
  showToast(`ピッキングリスト出力 ${rows.length-1}件`,'ok');
}

function dl(content,filename,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename;a.click();
}

// ===== クラウド同期（GitHub progress.json） =====
// 進捗から画像dataUrlを除いた軽量データを作る
function buildProgress(){
  const slim={};
  for(const[pkgi,r] of Object.entries(state.results)){
    slim[pkgi]={
      classifies:r.classifies||(r.classify?[r.classify]:[]),
      note:r.note||'',color:r.color||'',size:r.size||'',
      name:r.name||'',refUrl:r.refUrl||'',
      genTitle:r.genTitle||'',genDesc:r.genDesc||'',
      imageNames:(r.images||[]).map(i=>i.name),
      pkgiList:r.pkgiList||[],bundlingIds:r.bundlingIds||[],shelfNos:r.shelfNos||[],
    };
  }
  return{version:2,updatedAt:new Date().toISOString(),currentIndex:state.currentIndex,results:slim};
}

async function cloudSave(){
  if(!state.githubToken){showToast('GitHub tokenが必要です','warn');return;}
  showToast('クラウド保存中...','');
  const progress=buildProgress();
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(progress,null,1))));
  const url=`https://api.github.com/repos/${state.githubRepo}/contents/progress.json`;
  try{
    let sha;
    try{const r=await fetch(url,{headers:{Authorization:`token ${state.githubToken}`,Accept:'application/vnd.github.v3+json'}});if(r.ok)sha=(await r.json()).sha;}catch{}
    const body={message:`update progress ${new Date().toISOString()}`,content,branch:'main'};
    if(sha)body.sha=sha;
    const r=await fetch(url,{method:'PUT',headers:{Authorization:`token ${state.githubToken}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify(body)});
    if(r.ok)showToast(`クラウド保存完了 ${Object.keys(progress.results).length}件 ☁️`,'ok');
    else{const d=await r.json();showToast('保存失敗: '+(d.message||r.status),'warn');}
  }catch(e){showToast('保存失敗: '+e.message,'warn');}
}

async function cloudLoad(){
  if(!state.githubToken){showToast('GitHub tokenが必要です','warn');return;}
  if(!confirm('クラウドの進捗を読み込みます。\n現在の画面の進捗は上書きされます（画像は再アップロードが必要）。よろしいですか？'))return;
  showToast('クラウド読込中...','');
  const url=`https://api.github.com/repos/${state.githubRepo}/contents/progress.json`;
  try{
    const r=await fetch(url,{headers:{Authorization:`token ${state.githubToken}`,Accept:'application/vnd.github.v3+json'}});
    if(!r.ok){showToast('クラウドに進捗がありません','warn');return;}
    const d=await r.json();
    const json=decodeURIComponent(escape(atob(d.content)));
    const progress=JSON.parse(json);
    // progress → state.results へ（画像はjsDelivr URLでプレビュー復元）
    const cdnBase=`https://raw.githubusercontent.com/${state.githubRepo}/main/recoreimages/`;
    const results={};
    for(const[pkgi,r2] of Object.entries(progress.results)){
      results[pkgi]={
        classifies:r2.classifies||[],note:r2.note||'',color:r2.color||'',size:r2.size||'',
        name:r2.name||'',refUrl:r2.refUrl||'',genTitle:r2.genTitle||'',genDesc:r2.genDesc||'',
        images:(r2.imageNames||[]).map(n=>({name:n,dataUrl:'',cdnUrl:cdnBase+n,pushed:true})),
        pkgiList:r2.pkgiList||[],bundlingIds:r2.bundlingIds||[],shelfNos:r2.shelfNos||[],
      };
    }
    state.results=results;
    state.currentIndex=progress.currentIndex||0;
    saveState();
    showToast(`クラウド読込完了 ${Object.keys(results).length}件 ☁️`,'ok');
    navigateTo(state.currentIndex);
  }catch(e){showToast('読込失敗: '+e.message,'warn');}
}

function backupJSON(){
  // localStorageの生データ（画像込み）をそのまま保存
  const data=localStorage.getItem('recore_v2')||JSON.stringify({githubRepo:state.githubRepo,items:state.items,currentIndex:state.currentIndex,results:state.results});
  dl(data,`recore_backup_${new Date().toISOString().slice(0,10)}.json`,'application/json');
  showToast('バックアップ保存 💾','ok');
}

function importJSON(file){
  if(!file)return;
  if(!confirm('バックアップを復元します。現在の進捗は上書きされます。よろしいですか？'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.results){
        if(d.items&&d.items.length)state.items=d.items;
        state.results=d.results;
        state.currentIndex=d.currentIndex||0;
        saveState();
        showToast(`復元完了 ${Object.keys(d.results).length}件`,'ok');
        state.screen='work';
        navigateTo(state.currentIndex);
      }else{showToast('不正なバックアップファイル','warn');}
    }catch(err){showToast('復元失敗: '+err.message,'warn');}
  };
  reader.readAsText(file,'UTF-8');
}


let toastTimer;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='toast';},2500);
}

render();
