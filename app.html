<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECORE 画像アップロードツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #e8ff47; --accent2: #47c8ff; --warn: #ff8c47; --ok: #47ffb2;
    --text: #f0f0f0; --muted: #666;
    --mono: 'DM Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .header-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .layout { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 57px); }
  .main { padding: 28px 32px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
  .setup { display: flex; flex-direction: column; gap: 20px; max-width: 560px; margin: 40px auto; width: 100%; }
  .section-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  .input-field { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }
  .file-drop { border: 1px dashed var(--border); border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface2); position: relative; }
  .file-drop:hover, .file-drop.drag { border-color: var(--accent); background: #1e2010; }
  .file-drop-label { font-size: 13px; color: var(--muted); }
  .file-drop-label span { color: var(--accent); }
  .btn { padding: 12px 24px; border-radius: 6px; font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.04em; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #d4eb2e; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-ok { background: var(--ok); color: #000; }
  .btn-ok:hover { background: #2ee89a; }
  .btn-skip { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-skip:hover { border-color: var(--muted); color: var(--text); }
  .btn-warn { background: var(--warn); color: #000; }
  .btn-warn:hover { background: #e07030; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }
  .item-meta { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .item-pkgi { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.1em; margin-bottom: 6px; }
  .item-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .item-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 3px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1a1e0a; }
  .upload-zone-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.8; pointer-events: none; }
  .upload-zone-text span { color: var(--accent); font-family: var(--mono); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  /* Image grid with drag */
  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .image-thumb {
    position: relative; border-radius: 8px; overflow: hidden;
    border: 2px solid var(--border); background: var(--surface2);
    cursor: grab; transition: all 0.15s; user-select: none;
  }
  .image-thumb:active { cursor: grabbing; }
  .image-thumb.dragging { opacity: 0.4; border-color: var(--accent); transform: scale(0.97); }
  .image-thumb.drag-over { border-color: var(--accent2); box-shadow: 0 0 0 2px var(--accent2); }
  .image-thumb.excluded { opacity: 0.5; }
  .image-thumb.excluded .thumb-img { filter: grayscale(1); }
  .thumb-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; pointer-events: none; }
  .thumb-footer { padding: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: space-between; gap: 4px; border-top: 1px solid var(--border); }
  .thumb-num { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .thumb-num.excluded-num { color: var(--warn); text-decoration: line-through; }
  .thumb-controls { display: flex; gap: 4px; }
  .thumb-btn { width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .thumb-btn-use { background: #1a2e1a; color: var(--ok); }
  .thumb-btn-use:hover, .thumb-btn-use.active { background: var(--ok); color: #000; }
  .thumb-btn-exc { background: #2e1a1a; color: var(--warn); }
  .thumb-btn-exc:hover, .thumb-btn-exc.active { background: var(--warn); color: #000; }
  .thumb-btn-del { background: var(--surface); color: var(--muted); }
  .thumb-btn-del:hover { background: #3e1a1a; color: #ff6666; }
  .drag-hint { font-size: 11px; color: var(--muted); text-align: center; font-family: var(--mono); }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; resize: vertical; min-height: 60px; transition: border-color 0.2s; }
  .note-input:focus { border-color: var(--accent2); }
  .note-input::placeholder { color: var(--muted); }
  .sidebar { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
  .sidebar-section-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .stat-num { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .stat-ok .stat-num { color: var(--ok); }
  .stat-skip .stat-num { color: var(--muted); }
  .stat-warn .stat-num { color: var(--warn); }
  .stat-total .stat-num { color: var(--accent); }
  .history-list { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
  .history-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 5px; background: var(--surface2); border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: border-color 0.15s; }
  .history-item:hover { border-color: var(--muted); }
  .history-badge { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-ok { background: var(--ok); } .badge-skip { background: var(--muted); } .badge-warn { background: var(--warn); }
  .history-pkgi { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .history-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .push-btn { width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.8; }
  .push-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .push-btn.pushing { border-color: var(--accent); color: var(--accent); }
  .export-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .export-btn:hover { border-color: var(--ok); color: var(--ok); }
  .nav-row { display: flex; align-items: center; justify-content: space-between; }
  .progress-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-family: var(--mono); font-size: 12px; color: var(--text); z-index: 1000; transform: translateY(80px); opacity: 0; transition: all 0.25s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--ok); color: var(--ok); }
  .toast.warn { border-color: var(--warn); color: var(--warn); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 2; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// ===== PERSIST =====
function saveState() {
  try {
    // dataUrlは画像サイズが大きいのでresultsのみ保存（currentImagesは保存しない）
    const toSave = {
      githubRepo: state.githubRepo,
      items: state.items,
      currentIndex: state.currentIndex,
      results: state.results,
    };
    localStorage.setItem('recore_state', JSON.stringify(toSave));
  } catch(e) { console.warn('saveState failed', e); }
}

function loadState() {
  try {
    const saved = localStorage.getItem('recore_state');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

const _saved = loadState();
let state = {
  screen: _saved && _saved.items?.length > 0 ? 'resume' : 'setup',
  githubToken: localStorage.getItem('gh_token') || '',
  githubRepo: _saved?.githubRepo || 'osako0710/mercari-images',
  items: _saved?.items || [],
  currentIndex: _saved?.currentIndex || 0,
  results: _saved?.results || {},
  currentImages: [], currentNote: '', dragOver: false,
  dragSrcIdx: null,
};

// ===== RENDER =====
function render() {
  const html = state.screen === 'setup' ? renderSetup()
             : state.screen === 'resume' ? renderResume()
             : renderWork();
  document.getElementById('app').innerHTML = html;
  bindEvents();
}

function renderResume() {
  const done = Object.keys(state.results).length;
  const total = state.items.length;
  const nextItem = state.items[state.currentIndex];
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;">
    <div class="setup">
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;">前回の続き</div>
        <div style="font-size:24px;font-weight:700;margin-bottom:6px;">再開しますか？</div>
        <div style="font-size:13px;color:var(--muted);">前回の進捗が保存されています</div>
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:20px;display:flex;flex-direction:column;gap:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="color:var(--muted);font-size:13px;">処理済み</span>
          <span style="font-family:var(--mono);color:var(--ok);">${done} / ${total}件</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="color:var(--muted);font-size:13px;">残り</span>
          <span style="font-family:var(--mono);color:var(--accent);">${total - done}件</span>
        </div>
        ${nextItem ? `<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <span style="color:var(--muted);font-size:13px;white-space:nowrap;">次の商品</span>
          <span style="font-size:12px;color:var(--text);text-align:right;">${nextItem.name.substring(0,30)}…</span>
        </div>` : ''}
        <div style="background:var(--border);height:1px;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="color:var(--muted);font-size:13px;">リポジトリ</span>
          <span style="font-family:var(--mono);font-size:12px;color:var(--accent2);">${state.githubRepo}</span>
        </div>
      </div>
      ${!state.githubToken ? `<div style="background:#2e1a0a;border:1px solid var(--warn);border-radius:6px;padding:12px 14px;font-size:12px;color:var(--warn);">⚠ GitHub tokenが未設定です。設定画面で入力してください。</div>` : ''}
      <button class="btn btn-primary" id="resume-btn" ${!state.githubToken ? 'disabled' : ''}>続きから再開 →</button>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" id="settings-resume-btn" style="flex:1;text-align:center;">⚙ 設定を変更</button>
        <button class="btn btn-ghost" id="restart-btn" style="flex:1;text-align:center;color:var(--warn);border-color:#3e2020;">リセット</button>
      </div>
    </div>
  </div>`;
}

function renderSetup() {
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;">
    <div class="setup">
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;">RECORE 画像アップロードツール</div>
        <div style="font-size:24px;font-weight:700;margin-bottom:6px;">セットアップ</div>
        <div style="font-size:13px;color:var(--muted);">GitHub tokenとCSVを設定して作業を開始してください</div>
      </div>
      <div>
        <div class="section-label">GitHub Personal Access Token</div>
        <input class="input-field" id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${state.githubToken}">
        <div style="font-size:11px;color:var(--muted);margin-top:6px;">Settings → Developer settings → Tokens (classic) → repo権限</div>
      </div>
      <div>
        <div class="section-label">Push先リポジトリ</div>
        <input class="input-field" id="gh-repo" type="text" value="${state.githubRepo}">
      </div>
      <div>
        <div class="section-label">CSVファイル（シクサク様出品リスト）</div>
        <div class="file-drop" id="csv-drop">
          <div class="file-drop-label">
            ${state.items.length > 0
              ? `<span>✓ ${state.items.length}件 読み込み済み</span>`
              : `CSVをここにドロップ or <span>クリックして選択</span>`}
          </div>
          <input type="file" id="csv-input" accept=".csv">
        </div>
      </div>
      <button class="btn btn-primary" id="start-btn" ${state.items.length === 0 || !state.githubToken ? 'disabled' : ''}>
        作業開始 →
      </button>
    </div>
  </div>`;
}

function renderWork() {
  const item = state.items[state.currentIndex];
  const total = state.items.length;
  const done = Object.keys(state.results).length;
  const okCount = Object.values(state.results).filter(r => r.status === 'ok').length;
  const skipCount = Object.values(state.results).filter(r => r.status === 'skip').length;
  const warnCount = Object.values(state.results).filter(r => r.status === 'warn').length;
  const progress = total > 0 ? Math.round((done / total) * 100) : 0;
  const activeImgs = state.currentImages.filter(i => !i.excluded);

  const thumbsHtml = state.currentImages.map((img, i) => {
    const displayNum = state.currentImages.slice(0, i).filter(x => !x.excluded).length + 1;
    return `<div class="image-thumb ${img.excluded ? 'excluded' : ''}" data-idx="${i}">
      <img class="thumb-img" src="${img.dataUrl}">
      <div class="thumb-footer">
        <span class="thumb-num ${img.excluded ? 'excluded-num' : ''}">${img.excluded ? '除外' : '_' + displayNum}</span>
        <div class="thumb-controls">
          <button class="thumb-btn thumb-btn-use ${!img.excluded ? 'active' : ''}" data-action="use" data-idx="${i}" title="使う">✓</button>
          <button class="thumb-btn thumb-btn-exc ${img.excluded ? 'active' : ''}" data-action="exc" data-idx="${i}" title="除外">✗</button>
          <button class="thumb-btn thumb-btn-del" data-action="del" data-idx="${i}" title="削除">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const historyHtml = Object.entries(state.results).reverse().map(([pkgi, r]) => {
    const it = state.items.find(i => i.pkgi === pkgi);
    const bc = r.status === 'ok' ? 'badge-ok' : r.status === 'skip' ? 'badge-skip' : 'badge-warn';
    return `<div class="history-item" data-pkgi="${pkgi}">
      <div class="history-badge ${bc}"></div>
      <div class="history-pkgi">${pkgi.replace('PKGI-','')}</div>
      <div class="history-name">${it ? it.name.substring(0,18) : pkgi}</div>
      <div style="font-size:10px;color:var(--muted);flex-shrink:0;">${(r.images||[]).length}枚</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;height:100vh;">
    <div class="header">
      <div class="header-title">RECORE IMAGE UPLOADER</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);">${done} / <span style="color:var(--text);">${total}</span> 完了 (${progress}%)</div>
        <button class="btn btn-ghost" id="settings-btn" style="padding:6px 12px;font-size:11px;">⚙ 設定</button>
      </div>
    </div>
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="layout">
      <div class="main">
        ${item ? `
        <div class="nav-row">
          <div style="font-family:var(--mono);font-size:12px;color:var(--muted);">
            <span style="color:var(--text);">${state.currentIndex + 1}</span> / ${total}
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost" id="prev-btn" style="padding:6px 14px;font-size:12px;" ${state.currentIndex === 0 ? 'disabled' : ''}>← 前へ</button>
            <button class="btn btn-ghost" id="next-btn" style="padding:6px 14px;font-size:12px;" ${state.currentIndex >= total-1 ? 'disabled' : ''}>次へ →</button>
          </div>
        </div>
        <div class="item-meta">
          <div class="item-pkgi">${item.pkgi}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-tags">
            <span class="tag">${item.bundlingId}</span>
            <span class="tag">${item.type}</span>
            <span class="tag">${item.shop.replace(/_/g,'.')}</span>
            <span class="tag">¥${Number(item.price||0).toLocaleString()}</span>
          </div>
        </div>
        <div>
          <div class="section-label">画像（使用 ${activeImgs.length}枚 / 計 ${state.currentImages.length}枚）</div>
          <div class="upload-zone ${state.dragOver ? 'drag' : ''}" id="upload-zone">
            <div class="upload-zone-text">画像をドロップ or <span>クリックして選択</span><br>
            <span style="font-size:11px;color:var(--muted);font-family:var(--sans);">jpg / png / webp · 複数枚OK</span></div>
            <input type="file" id="img-input" accept="image/*" multiple>
          </div>
          ${state.currentImages.length > 0 ? `
          <div style="margin-top:12px;">
            <div class="image-grid" id="image-grid">${thumbsHtml}</div>
            <div class="drag-hint" style="margin-top:8px;">↕ ドラッグで並び替え　✓ 使う　✗ 除外</div>
          </div>` : ''}
        </div>
        <div>
          <div class="section-label">備考・メモ</div>
          <textarea class="note-input" id="note-input" placeholder="要確認の理由、色違いの可能性など...">${state.currentNote}</textarea>
        </div>
        <div class="actions">
          <button class="btn btn-ok" id="ok-btn">✓ OK・次へ</button>
          <button class="btn btn-warn" id="warn-btn">⚠ 要確認・次へ</button>
          <button class="btn btn-skip" id="skip-btn">→ スキップ</button>
        </div>
        ` : `<div class="empty-state">🎉 全件完了！<br>サイドバーからエクスポートまたはpushしてください</div>`}
      </div>
      <div class="sidebar">
        <div>
          <div class="sidebar-section-title">進捗サマリ</div>
          <div class="stats">
            <div class="stat-card stat-ok"><div class="stat-num">${okCount}</div><div class="stat-label">OK</div></div>
            <div class="stat-card stat-warn"><div class="stat-num">${warnCount}</div><div class="stat-label">要確認</div></div>
            <div class="stat-card stat-skip"><div class="stat-num">${skipCount}</div><div class="stat-label">スキップ</div></div>
            <div class="stat-card stat-total"><div class="stat-num">${total - done}</div><div class="stat-label">残り</div></div>
          </div>
        </div>
        <div>
          <div class="sidebar-section-title">GitHub Push</div>
          <button class="push-btn" id="push-btn">
            ↑ recoreimages/ にpush<br>
            <span style="font-size:10px;color:var(--muted);">${okCount + warnCount}件の画像をまとめてpush</span>
          </button>
        </div>
        <div>
          <div class="sidebar-section-title">エクスポート</div>
          <button class="export-btn" id="export-csv-btn">📥 進捗CSV ダウンロード</button>
        </div>
        <div>
          <div class="sidebar-section-title">処理済み（${done}件）</div>
          <div class="history-list">${historyHtml || '<div style="font-size:12px;color:var(--muted);padding:8px 0;">まだありません</div>'}</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ===== EVENTS =====
function bindEvents() {
  if (state.screen === 'resume') {
    document.getElementById('resume-btn')?.addEventListener('click', () => { state.screen = 'work'; render(); });
    document.getElementById('settings-resume-btn')?.addEventListener('click', () => { state.screen = 'setup'; render(); });
    document.getElementById('restart-btn')?.addEventListener('click', () => {
      if (confirm('進捗をリセットしますか？この操作は元に戻せません。')) {
        localStorage.removeItem('recore_state');
        state.results = {}; state.currentIndex = 0; state.items = [];
        state.screen = 'setup'; render();
      }
    });
  } else if (state.screen === 'setup') {
    document.getElementById('gh-token')?.addEventListener('input', e => {
      state.githubToken = e.target.value;
      localStorage.setItem('gh_token', e.target.value);
      document.getElementById('start-btn').disabled = state.items.length === 0 || !state.githubToken;
    });
    document.getElementById('gh-repo')?.addEventListener('input', e => { state.githubRepo = e.target.value; });
    document.getElementById('csv-input')?.addEventListener('change', e => loadCSV(e.target.files[0]));
    document.getElementById('start-btn')?.addEventListener('click', () => { state.screen = 'work'; render(); });
    const drop = document.getElementById('csv-drop');
    if (drop) {
      drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
      drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
      drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); loadCSV(e.dataTransfer.files[0]); });
    }
  } else {
    document.getElementById('settings-btn')?.addEventListener('click', () => { state.screen = 'setup'; render(); });
    document.getElementById('prev-btn')?.addEventListener('click', () => navigateTo(state.currentIndex - 1));
    document.getElementById('next-btn')?.addEventListener('click', () => navigateTo(state.currentIndex + 1));
    document.getElementById('ok-btn')?.addEventListener('click', () => saveAndNext('ok'));
    document.getElementById('warn-btn')?.addEventListener('click', () => saveAndNext('warn'));
    document.getElementById('skip-btn')?.addEventListener('click', () => saveAndNext('skip'));
    document.getElementById('note-input')?.addEventListener('input', e => { state.currentNote = e.target.value; });
    document.getElementById('push-btn')?.addEventListener('click', pushToGitHub);
    document.getElementById('export-csv-btn')?.addEventListener('click', exportCSV);

    const zone = document.getElementById('upload-zone');
    if (zone) {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
        if (state.dragSrcIdx !== null) return; // サムネイルDrag中は無視
        state.dragOver = true; render();
      });
      zone.addEventListener('dragleave', () => { state.dragOver = false; render(); });
      zone.addEventListener('drop', e => {
        e.preventDefault(); state.dragOver = false;
        if (state.dragSrcIdx !== null) return; // サムネイルDrop中は無視
        if (e.dataTransfer.files.length > 0) handleImages(e.dataTransfer.files);
      });
    }
    document.getElementById('img-input')?.addEventListener('change', e => handleImages(e.target.files));

    // サムネイルボタン
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        const action = btn.dataset.action;
        if (action === 'use') { state.currentImages[idx].excluded = false; render(); }
        else if (action === 'exc') { state.currentImages[idx].excluded = true; render(); }
        else if (action === 'del') { state.currentImages.splice(idx, 1); render(); }
      });
    });

    // ドラッグ並び替え
    bindDragSort();

    document.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = state.items.findIndex(i => i.pkgi === el.dataset.pkgi);
        if (idx >= 0) navigateTo(idx);
      });
    });
  }
}

function bindDragSort() {
  const grid = document.getElementById('image-grid');
  if (!grid) return;

  let dragEl = null;
  let placeholder = null;
  let startIdx = null;

  function getThumbAt(x, y) {
    const els = document.querySelectorAll('.image-thumb');
    for (const el of els) {
      const r = el.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return el;
    }
    return null;
  }

  document.querySelectorAll('.image-thumb').forEach(thumb => {
    thumb.addEventListener('mousedown', e => {
      if (e.target.closest('button')) return; // ボタンクリックは無視
      e.preventDefault();

      startIdx = parseInt(thumb.dataset.idx);
      dragEl = thumb.cloneNode(true);
      dragEl.style.cssText = `
        position:fixed; z-index:9999; pointer-events:none; opacity:0.85;
        width:${thumb.offsetWidth}px; height:${thumb.offsetHeight}px;
        border:2px solid var(--accent); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.5);
        transform:rotate(2deg) scale(1.05); transition:none;
      `;
      const r = thumb.getBoundingClientRect();
      dragEl.style.left = r.left + 'px';
      dragEl.style.top = r.top + 'px';
      document.body.appendChild(dragEl);

      // プレースホルダー
      placeholder = document.createElement('div');
      placeholder.style.cssText = `
        width:${thumb.offsetWidth}px; height:${thumb.offsetHeight}px;
        border:2px dashed var(--accent2); border-radius:8px; background:#1a2030;
        opacity:0.5;
      `;
      thumb.replaceWith(placeholder);
      thumb.style.display = 'none';
      document.body.appendChild(thumb); // DOM保持用

      const onMouseMove = e => {
        if (!dragEl) return;
        dragEl.style.left = (e.clientX - thumb.offsetWidth/2) + 'px';
        dragEl.style.top = (e.clientY - thumb.offsetHeight/2) + 'px';

        const over = getThumbAt(e.clientX, e.clientY);
        if (over && over !== placeholder && over.dataset.idx !== undefined) {
          const overRect = over.getBoundingClientRect();
          const midX = overRect.left + overRect.width / 2;
          if (e.clientX < midX) {
            grid.insertBefore(placeholder, over);
          } else {
            grid.insertBefore(placeholder, over.nextSibling);
          }
        }
      };

      const onMouseUp = e => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);

        if (dragEl) { dragEl.remove(); dragEl = null; }

        // placeholderの位置からdestIdxを求める
        const allThumbs = [...grid.querySelectorAll('.image-thumb')];
        let destIdx = allThumbs.length; // デフォルトは末尾
        const placeholderIdx = [...grid.children].indexOf(placeholder);
        // placeholder前にあるimage-thumbの数
        let count = 0;
        for (let i = 0; i < placeholderIdx; i++) {
          if (grid.children[i].classList && grid.children[i].classList.contains('image-thumb')) count++;
        }
        destIdx = count;

        if (placeholder) { placeholder.remove(); placeholder = null; }
        if (thumb.parentNode) thumb.remove();

        if (startIdx !== null && startIdx !== destIdx) {
          const imgs = [...state.currentImages];
          const [moved] = imgs.splice(startIdx, 1);
          const insertAt = destIdx > startIdx ? destIdx - 1 : destIdx;
          imgs.splice(insertAt, 0, moved);
          state.currentImages = imgs;
        }
        startIdx = null;
        render();
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  });
}

function navigateTo(idx) {
  state.currentIndex = Math.max(0, Math.min(state.items.length - 1, idx));
  saveState();
  const pkgi = state.items[state.currentIndex]?.pkgi;
  if (pkgi && state.results[pkgi]) {
    state.currentImages = [...(state.results[pkgi].images || [])];
    state.currentNote = state.results[pkgi].note || '';
  } else {
    state.currentImages = [];
    state.currentNote = '';
  }
  render();
}

function loadCSV(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
    const items = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 5 || !cols[1]?.trim().startsWith('PKGI-')) continue;
      items.push({ bundlingId: cols[0]?.trim(), pkgi: cols[1]?.trim(), shelf: cols[2]?.trim(), type: cols[3]?.trim(), name: cols[4]?.trim(), qty: cols[5]?.trim(), price: cols[7]?.trim(), shop: cols[8]?.trim() || '' });
    }
    state.items = items;
    saveState();
    showToast(`${items.length}件 読み込みました`, 'ok');
    render();
  };
  reader.readAsText(file, 'UTF-8');
}

function handleImages(files) {
  const pkgi = state.items[state.currentIndex]?.pkgi || 'UNKNOWN';
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const idx = state.currentImages.length + 1;
      state.currentImages.push({ name: `${pkgi}_${idx}.jpg`, dataUrl: e.target.result, excluded: false });
      render();
    };
    reader.readAsDataURL(file);
  });
}

function saveAndNext(status) {
  const item = state.items[state.currentIndex];
  if (!item) return;
  // 除外されていない画像のみ、連番を振り直して保存
  let num = 1;
  const images = state.currentImages
    .filter(img => !img.excluded)
    .map(img => ({ ...img, name: `${item.pkgi}_${num++}.jpg` }));
  state.results[item.pkgi] = { status, images, note: state.currentNote, name: item.name };
  saveState();
  showToast({ ok: 'OK ✓', warn: '要確認 ⚠', skip: 'スキップ →' }[status], status);
  if (state.currentIndex < state.items.length - 1) navigateTo(state.currentIndex + 1);
  else { state.currentImages = []; state.currentNote = ''; render(); }
}

async function pushToGitHub() {
  const btn = document.getElementById('push-btn');
  btn?.classList.add('pushing');
  let success = 0, fail = 0;
  for (const [, result] of Object.entries(state.results)) {
    if (!result.images?.length) continue;
    for (const img of result.images) {
      try {
        const base64 = img.dataUrl.split(',')[1];
        const url = `https://api.github.com/repos/${state.githubRepo}/contents/recoreimages/${img.name}`;
        let sha;
        try { const r = await fetch(url, { headers: { Authorization: `token ${state.githubToken}`, Accept: 'application/vnd.github.v3+json' } }); if (r.ok) { sha = (await r.json()).sha; } } catch {}
        const body = { message: `add ${img.name}`, content: base64, branch: 'main' };
        if (sha) body.sha = sha;
        const r = await fetch(url, { method: 'PUT', headers: { Authorization: `token ${state.githubToken}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' }, body: JSON.stringify(body) });
        r.ok ? success++ : fail++;
      } catch { fail++; }
    }
  }
  btn?.classList.remove('pushing');
  showToast(`push完了: ${success}件成功${fail > 0 ? ` / ${fail}件失敗` : ''}`, fail > 0 ? 'warn' : 'ok');
}

function exportCSV() {
  const rows = [['PKGI', '商品名', 'ステータス', '画像枚数', '画像ファイル名', '備考']];
  for (const [pkgi, r] of Object.entries(state.results)) {
    rows.push([pkgi, r.name || '', r.status, (r.images || []).length, (r.images || []).map(i => i.name).join(';'), r.note || '']);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv' }));
  a.download = `recore_progress_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

render();
</script>
</body>
</html>
